<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0047AB">
    <title>Alkimista Pro - Silencioso</title>
    
    <link rel="manifest" href='data:application/manifest+json,{"name":"Alkimista Pro","short_name":"Alkimista","start_url":".","display":"standalone","background_color":"#0047AB","theme_color":"#0047AB","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/190/190411.png","sizes":"512x512","type":"image/png"}]}'>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: #0047AB; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        
        .container { 
            background: white; padding: 2rem; border-radius: 28px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.5); 
            max-width: 450px; width: 100%; position: relative;
        }

        .tabs { display: flex; gap: 10px; margin-bottom: 20px; background: #f1f5f9; padding: 6px; border-radius: 18px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 14px; cursor: pointer; font-weight: 700; color: #64748b; transition: 0.3s; background: transparent; }
        .tab-btn.active { background: white; color: #0047AB; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h1 { color: #1e293b; text-align: center; font-size: 1.6rem; margin-bottom: 1.5rem; font-weight: 800; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: 700; color: #475569; font-size: 0.9rem; }
        input, textarea { width: 100%; padding: 15px; border: 2px solid #e2e8f0; border-radius: 16px; font-size: 16px; outline: none; background: #f8fafc; transition: 0.2s; }

        .resultados { background: #f1f5f9; padding: 15px; border-radius: 20px; margin-bottom: 15px; border: 1px solid #e2e8f0; }
        .res-row { display: flex; justify-content: space-between; padding: 8px; font-weight: 600; cursor: pointer; }
        .valor-final { color: #059669; font-weight: 800; font-size: 1.1rem; }

        .total-box { background: linear-gradient(135deg, #0047AB, #001a3d); color: white; padding: 20px; border-radius: 22px; text-align: center; margin-bottom: 15px; }
        .total-val { font-size: 2.4rem; font-weight: 800; }

        .btn { width: 100%; padding: 16px; border: none; border-radius: 16px; font-weight: 700; cursor: pointer; transition: 0.2s; margin-bottom: 10px; font-size: 1rem; }
        .btn-green { background: #10b981; color: white; }
        .btn-blue { background: #0047AB; color: white; }
        .btn-gray { background: #94a3b8; color: white; }
        .btn-red { background: #ef4444; color: white; }
        .btn:disabled { opacity: 0.4; }

        .nota-card { background: white; border: 1px solid #e2e8f0; padding: 15px; border-radius: 18px; margin-bottom: 10px; border-left: 6px solid #0047AB; position: relative; }
        .nota-card.done { opacity: 0.6; border-left-color: #cbd5e1; }
        .btn-del { position: absolute; top: 10px; right: 10px; background: #fee2e2; color: #ef4444; border: none; width: 26px; height: 26px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-150%); background: white; padding: 15px 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border-left: 6px solid #0047AB; z-index: 10000; transition: 0.5s ease; width: 90%; max-width: 380px; }
        #toast.show { transform: translateX(-50%) translateY(0); }

        .perm-btn { background: #fffbeb; color: #b45309; border: 1px solid #fde68a; padding: 10px; border-radius: 12px; font-size: 0.8rem; margin-bottom: 15px; cursor: pointer; width: 100%; font-weight: 600; display: none; }
    </style>
</head>
<body>

<div id="toast">
    <div style="font-weight: 800; color: #0047AB;">🔔 ALKIMISTA AVISA:</div>
    <div id="toastMsg" style="font-size: 0.9rem; color: #475569; margin-top: 5px;"></div>
</div>

<div class="container">
    <button id="btnPermissao" class="perm-btn" onclick="App.pedirPermissao()">⚠️ Ativar notificações no PC</button>

    <nav class="tabs">
        <button class="tab-btn active" onclick="App.switch('calc')" id="t-calc">Calculadora</button>
        <button class="tab-btn" onclick="App.switch('notes')" id="t-notes">Anotações</button>
    </nav>

    <div id="view-calc" class="tab-content active">
        <h1>Alkimista 20%</h1>
        <div class="input-group">
            <label>Valor para Cálculo</label>
            <input type="number" id="vOrig" placeholder="R$ 0,00" inputmode="decimal" oninput="App.calc()">
        </div>
        <div class="resultados">
            <div class="res-row" onclick="App.copy('displayBase')"><span>Base:</span> <span id="displayBase">R$ 0,00</span></div>
            <div class="res-row" onclick="App.copy('displayFin')"><span>Com Desconto:</span> <span id="displayFin" class="valor-final">R$ 0,00</span></div>
        </div>
        <div class="total-box">
            <div style="font-size: 0.8rem; font-weight: 700; opacity: 0.8; margin-bottom: 5px;">TOTAL ACUMULADO</div>
            <div class="total-val" id="totalVal">R$ 0,00</div>
        </div>
        <button class="btn btn-green" id="btnSomar" onclick="App.somar()" disabled>➕ Somar agora</button>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-gray" onclick="App.limpar()">Limpar</button>
            <button class="btn btn-red" onclick="App.reset()">Reset</button>
        </div>
        <div id="histLista" style="margin-top: 15px;"></div>
    </div>

    <div id="view-notes" class="tab-content">
        <h1>Anotações</h1>
        <div class="input-group">
            <label>Mensagem do Lembrete</label>
            <textarea id="nTexto" rows="3" placeholder="O que eu preciso lembrar?"></textarea>
        </div>
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <div style="flex:1"><label>Data</label><input type="date" id="nData"></div>
            <div style="flex:1"><label>Hora</label><input type="time" id="nHora"></div>
        </div>
        <button class="btn btn-blue" onclick="App.addNota()">✨ Agendar Notificação</button>
        <div id="notasLista" style="margin-top: 20px;"></div>
    </div>

    <div style="text-align: center; color: #94a3b8; font-size: 0.7rem; margin-top: 15px;">💊 Farmácia Alkimista v3.1</div>
</div>

<script>
class AlkimistaApp {
    constructor() {
        this.total = 0; this.hist = []; this.notas = []; this.tmpF = 0; this.tmpO = 0;
        this.init();
    }

    init() {
        this.load();
        this.render();
        this.checkPerms();
        setInterval(() => this.monitor(), 10000);
    }

    checkPerms() {
        if ("Notification" in window && Notification.permission !== "granted") {
            document.getElementById('btnPermissao').style.display = 'block';
        }
    }

    async pedirPermissao() {
        const p = await Notification.requestPermission();
        if (p === "granted") {
            document.getElementById('btnPermissao').style.display = 'none';
            this.notify("Notificações ativadas!");
        }
    }

    switch(t) {
        document.querySelectorAll('.tab-content, .tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(`view-${t}`).classList.add('active');
        document.getElementById(`t-${t}`).classList.add('active');
    }

    calc() {
        const v = parseFloat(document.getElementById('vOrig').value);
        if (isNaN(v) || v <= 0) { this.resetDisp(); return; }
        this.tmpO = v; this.tmpF = v * 0.8;
        document.getElementById('displayBase').textContent = this.fmt(v);
        document.getElementById('displayFin').textContent = this.fmt(this.tmpF);
        document.getElementById('btnSomar').disabled = false;
    }

    resetDisp() {
        document.getElementById('displayBase').textContent = 'R$ 0,00';
        document.getElementById('displayFin').textContent = 'R$ 0,00';
        document.getElementById('btnSomar').disabled = true;
    }

    somar() {
        if (this.tmpF <= 0) return;
        this.total += this.tmpF;
        this.hist.push({ o: this.tmpO, f: this.tmpF });
        if (this.hist.length > 25) this.hist.shift();
        this.limpar(); this.render(); this.save();
    }

    limpar() { document.getElementById('vOrig').value = ''; this.resetDisp(); }

    reset() { if(confirm("Zerar total acumulado?")) { this.total = 0; this.hist = []; this.render(); this.save(); } }

    notify(msg) {
        // Visual Toast
        const t = document.getElementById('toast');
        document.getElementById('toastMsg').textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 6000);

        // Notificação de Sistema
        if (Notification.permission === "granted") {
            const n = new Notification("Alkimista", {
                body: msg,
                icon: "https://cdn-icons-png.flaticon.com/512/190/190411.png",
                silent: true // Garante que o sistema não emita som
            });
            n.onclick = () => { window.focus(); n.close(); };
        }
    }

    monitor() {
        const agora = new Date();
        const dHoje = agora.toISOString().split('T')[0];
        const hAgora = agora.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit', hour12: false});
        
        this.notas.forEach(n => {
            if (!n.done && n.data === dHoje && n.hora === hAgora) {
                this.notify(n.texto);
                n.done = true; this.save(); this.render();
            }
        });
    }

    addNota() {
        const t = document.getElementById('nTexto').value;
        const d = document.getElementById('nData').value;
        const h = document.getElementById('nHora').value;
        if (!t || !d || !h) return;
        this.notas.push({ id: Date.now(), texto: t, data: d, hora: h, done: false });
        this.render(); this.save();
        document.getElementById('nTexto').value = '';
        this.notify("Agendado!");
    }

    delNota(id) { this.notas = this.notas.filter(n => n.id !== id); this.render(); this.save(); }

    fmt(v) { return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }

    render() {
        document.getElementById('totalVal').textContent = this.fmt(this.total);
        document.getElementById('histLista').innerHTML = this.hist.slice().reverse().map(i => `
            <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #f1f5f9; font-size:0.85rem">
                <span style="color:#94a3b8">Orig: ${this.fmt(i.o)}</span> <b>+ ${this.fmt(i.f)}</b>
            </div>`).join('');
        
        document.getElementById('notasLista').innerHTML = this.notas.map(n => `
            <div class="nota-card ${n.done ? 'done' : ''}">
                <button class="btn-del" onclick="App.delNota(${n.id})">✕</button>
                <div style="font-size:0.75rem; color:#0047AB; font-weight:800; margin-bottom:4px;">📅 ${n.data.split('-').reverse().join('/')} às ${n.hora}</div>
                <div style="color:#1e293b; font-size:0.95rem; font-weight:500">${n.texto}</div>
                ${n.done ? '<div style="font-size:0.65rem; color:#059669; margin-top:5px; font-weight:800">✓ ENVIADA</div>' : ''}
            </div>`).join('');
    }

    save() { localStorage.setItem('alk_v3.1', JSON.stringify({ t: this.total, h: this.hist, n: this.notas })); }
    load() {
        const s = localStorage.getItem('alk_v3.1');
        if (s) { const p = JSON.parse(s); this.total = p.t || 0; this.hist = p.h || []; this.notas = p.n || []; }
    }
    copy(id) {
        const t = document.getElementById(id).textContent;
        if(t.includes("0,00")) return;
        navigator.clipboard.writeText(t);
        this.notify("Copiado!");
    }
}
const App = new AlkimistaApp();
</script>
</body>
</html>
