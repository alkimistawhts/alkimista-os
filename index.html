<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alkimista OS v14.0</title>
    <style>
        /* Variáveis e Estilos Base */
        :root {
            --bg-body: #f1f5f9; --bg-sidebar: #0047AB; --bg-card: #ffffff;
            --text-main: #1e293b; --text-sub: #64748b; --accent: #3b82f6; --border: #e2e8f0;
            --sidebar-w: 70px; --danger: #ef4444; --success: #10b981;
        }
        .dark-mode {
            --bg-body: #0f172a; --bg-sidebar: #1e293b; --bg-card: #1e293b;
            --text-main: #f8fafc; --text-sub: #94a3b8; --accent: #38bdf8; --border: #334155;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg-body); color: var(--text-main); min-height: 100vh; display: flex; }

        /* Sidebar */
        .sidebar { width: var(--sidebar-w); background: var(--bg-sidebar); height: 100vh; position: fixed; left: 0; top: 0; display: flex; flex-direction: column; padding: 15px 5px; z-index: 1000; transition: 0.3s; overflow: hidden; }
        .sidebar:hover { width: 200px; }
        .nav-item { padding: 15px; color: white; display: flex; align-items: center; cursor: pointer; border-radius: 10px; margin-bottom: 5px; opacity: 0.6; }
        .nav-item.active { opacity: 1; background: rgba(255,255,255,0.1); }
        .nav-item i { font-style: normal; font-size: 1.5rem; min-width: 40px; text-align: center; }
        .nav-item span { margin-left: 10px; font-weight: bold; white-space: nowrap; }

        /* Main Content */
        .main { flex: 1; margin-left: var(--sidebar-w); padding: 20px; display: flex; justify-content: center; }
        .app-container { max-width: 600px; width: 100%; }
        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Inputs - O CORAÇÃO DO PROBLEMA */
        input, textarea, select { 
            width: 100%; padding: 15px; margin: 10px 0; 
            border: 2px solid var(--border); border-radius: 12px; 
            background: var(--bg-card); color: var(--text-main);
            font-size: 16px; /* Evita zoom no iPhone */
            -webkit-appearance: none; /* Remove sombras do iOS */
        }

        .card { background: var(--bg-card); padding: 20px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid var(--border); }
        button { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; color: white; margin-top: 10px; }
        .btn-blue { background: #0047AB; }
        .btn-green { background: #10b981; }
        .btn-red { background: #ef4444; }
        
        @media (max-width: 600px) {
            .sidebar { width: 100%; height: 60px; top: auto; bottom: 0; flex-direction: row; justify-content: space-around; padding: 0; }
            .main { margin-left: 0; margin-bottom: 70px; }
            .nav-item span { display: none; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="nav-item active" onclick="window.App.switch('calc')" id="nav-calc"><i>🧮</i><span>Calculadora</span></div>
        <div class="nav-item" onclick="window.App.switch('prod')" id="nav-prod"><i>🧪</i><span>Produtos</span></div>
        <div class="nav-item" onclick="window.App.switch('notes')" id="nav-notes"><i>📝</i><span>Notas</span></div>
    </aside>

    <main class="main">
        <div class="app-container">
            <div id="view-calc" class="view active">
                <div class="card">
                    <h2>Calculadora 20%</h2>
                    <label>Valor Original</label>
                    <input type="text" id="vOrig" inputmode="decimal" placeholder="R$ 0,00">
                    <p>Com Desconto: <b id="comDesconto">R$ 0,00</b></p>
                    <button class="btn-green" id="btnSomar">Somar</button>
                    <h1 id="totalVal" style="text-align:center; margin-top:20px;">R$ 0,00</h1>
                    <div id="histLista"></div>
                </div>
            </div>

            <div id="view-prod" class="view">
                <div class="card">
                    <h2>Gerenciar Produtos</h2>
                    <input type="text" id="pNome" placeholder="Nome do Produto">
                    <input type="text" id="pPreco" inputmode="decimal" placeholder="Preço">
                    <button class="btn-blue" onclick="window.App.addProd()">Salvar Produto</button>
                    <div id="listaProd" style="margin-top:20px;"></div>
                </div>
            </div>

            <div id="view-notes" class="view">
                <div class="card">
                    <h2>Anotações Rápidas</h2>
                    <textarea id="txtNota" rows="5" placeholder="Digite algo..."></textarea>
                    <button class="btn-blue" onclick="window.App.addNota()">Salvar Nota</button>
                    <div id="listaNotas" style="margin-top:20px;"></div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        // Configurações do Firebase (Mantenha as suas originais aqui)
        // ... (Cole aqui o bloco de import e firebaseConfig que você já tem)

        class AlkimistaApp {
            constructor() {
                this.total = 0;
                this.historico = [];
                this.produtos = [];
                this.notas = [];
                this.setupCalc();
            }

            // A MÁGICA PARA O TECLADO FUNCIONAR
            setupCalc() {
                const input = document.getElementById('vOrig');
                input.addEventListener('input', (e) => {
                    // Permite digitar, mas limpa o valor para o cálculo
                    let v = e.target.value.replace(',', '.');
                    let n = parseFloat(v) || 0;
                    document.getElementById('comDesconto').innerText = (n * 0.8).toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
                });
            }

            switch(aba) {
                document.querySelectorAll('.view, .nav-item').forEach(el => el.classList.remove('active'));
                document.getElementById('view-' + aba).classList.add('active');
                document.getElementById('nav-' + aba).classList.add('active');
            }

            // Funções de Produtos e Notas (Reconstruídas)
            addProd() {
                const n = document.getElementById('pNome').value;
                const p = document.getElementById('pPreco').value;
                if(!n || !p) return;
                this.produtos.push({nome: n, preco: p});
                this.renderProds();
            }

            renderProds() {
                document.getElementById('listaProd').innerHTML = this.produtos.map(p => `<div>${p.nome} - R$ ${p.preco}</div>`).join('');
            }
        }

        window.App = new AlkimistaApp();
    </script>
</body>
</html>
