<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0047AB">
    <title>Alkimista OS v13.9.3</title>
    <style>
        :root { --bg-body: #f1f5f9; --bg-sidebar: #0047AB; --bg-card: #ffffff; --text-main: #1e293b; --text-sub: #64748b; --accent: #3b82f6; --border: #e2e8f0; --sidebar-w: 70px; --danger: #ef4444; --success: #10b981; }
        .dark-mode { --bg-body: #0f172a; --bg-sidebar: #1e293b; --bg-card: #1e293b; --text-main: #f8fafc; --text-sub: #94a3b8; --accent: #38bdf8; --border: #334155; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-body); min-height: 100vh; display: flex; color: var(--text-main); overflow-x: hidden; }
        .sidebar { width: var(--sidebar-w); background: var(--bg-sidebar); height: 100vh; display: flex; flex-direction: column; padding: 20px 10px; position: fixed; left: 0; top: 0; z-index: 2000; overflow: hidden; white-space: nowrap; transition: 0.2s; }
        .sidebar:hover { width: 220px; }
        .nav-item { width: 100%; height: 50px; border-radius: 12px; margin-bottom: 15px; display: flex; align-items: center; padding: 0 13px; cursor: pointer; color: white; opacity: 0.6; }
        .nav-item i { font-size: 1.4rem; min-width: 30px; display: flex; justify-content: center; font-style: normal; }
        .nav-item span { margin-left: 15px; font-weight: 600; opacity: 0; transition: 0.2s; }
        .sidebar:hover .nav-item span { opacity: 1; }
        .nav-item.active { opacity: 1; background: rgba(255,255,255,0.15); }
        .main { flex: 1; margin-left: var(--sidebar-w); padding: 20px; display: flex; justify-content: center; }
        .app-container { max-width: 600px; width: 100%; }
        .view { display: none; }
        .view.active { display: block; }
        .card { background: var(--bg-card); padding: 20px; border-radius: 24px; border: 1px solid var(--border); margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h1 { font-size: 1.5rem; margin-bottom: 20px; text-align: center; font-weight: 800; }
        label { font-size: 0.7rem; font-weight: 800; opacity: 0.6; margin-bottom: 4px; display: block; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 12px; font-size: 16px; outline: none; background: var(--bg-body); color: var(--text-main); margin-bottom: 10px; }
        .display-box { background: var(--bg-body); padding: 15px; border-radius: 18px; margin-bottom: 15px; }
        .display-line { display: flex; justify-content: space-between; padding: 5px 0; }
        .total-banner { background: linear-gradient(135deg, #0047AB, #002B6A); color: white; padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 15px; }
        .total-banner b { font-size: 2.2rem; font-weight: 800; }
        button { width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; color: white; margin-bottom: 8px; }
        .btn-green { background: #10b981; }
        .btn-blue { background: #0047AB; }
        .btn-red { background: var(--danger); }
        .btn-gray { background: #64748b; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 3000; padding: 15px; }
        .overlay.active { display: flex; }
        .modal-container { background: var(--bg-card); width: 100%; max-width: 450px; padding: 25px; border-radius: 28px; }
        @media (max-width: 600px) {
            .sidebar { width: 100%; height: 65px; bottom: 0; top: auto; flex-direction: row; justify-content: space-around; padding: 0; border-radius: 20px 20px 0 0; }
            .nav-item span { display: none; }
            .main { margin-left: 0; margin-bottom: 80px; padding: 15px; }
        }
    </style>
</head>
<body>

    <div id="view-login" class="overlay">
        <div class="modal-container">
            <h1 style="color:var(--bg-sidebar)">Alkimista OS</h1>
            <input type="text" id="loginUser" placeholder="Usuário">
            <input type="password" id="loginPass" placeholder="Senha">
            <button class="btn-blue" id="btnLogin">Entrar</button>
        </div>
    </div>

    <aside class="sidebar">
        <div class="nav-item active" onclick="window.App.switch('calc')" id="nav-calc"><i>🧮</i><span>Calculadora</span></div>
        <div class="nav-item" onclick="window.App.switch('prod')" id="nav-prod"><i>🧪</i><span>Produtos</span></div>
        <div class="nav-item" onclick="window.App.switch('serv')" id="nav-serv"><i>📏</i><span>Serviços</span></div>
        <div class="nav-item" onclick="window.App.logout()" style="margin-top: auto;"><i>🚪</i><span>Sair</span></div>
    </aside>

    <main class="main">
        <div class="app-container">
            <div id="view-calc" class="view active">
                <h1>Calculadora 20%</h1>
                <div class="card">
                    <label>Valor Original</label>
                    <input type="text" id="vOrig" placeholder="0,00" inputmode="decimal">
                    <div class="display-box">
                        <div class="display-line"><span>Bruto</span> <span id="bruto">R$ 0,00</span></div>
                        <div class="display-line"><b>Com Desconto</b> <b id="comDesconto" style="color: #10b981;">R$ 0,00</b></div>
                    </div>
                    <div class="total-banner">
                        <span>TOTAL ACUMULADO</span><br>
                        <b id="totalVal">R$ 0,00</b>
                    </div>
                    <button class="btn-green" id="btnSomar" disabled>➕ Somar</button>
                    <div style="display: flex; gap: 10px;">
                        <button id="btnLimpar" class="btn-gray" style="flex:1">Limpar</button>
                        <button id="btnResetTotal" class="btn-red" style="flex:1">Zerar</button>
                    </div>
                </div>
                <div id="histLista"></div>
            </div>

            <div id="view-prod" class="view">
                <h1>Catálogo</h1>
                <input type="text" id="pBusca" placeholder="🔍 Buscar produto...">
                <div id="prodLista"></div>
            </div>

            <div id="view-serv" class="view">
                <h1>Duração de Tratamento</h1>
                <div class="card">
                    <div id="fasesContainer"></div>
                    <button class="btn-blue" onclick="window.App.addFase()">+ Adicionar Fase</button>
                    <div class="total-banner" style="margin-top:15px; padding: 15px;">
                        <b id="resGeral" style="font-size: 1.4rem;">0 uni/mL</b>
                    </div>
                    <button class="btn-gray" onclick="window.App.resetFases()">Limpar</button>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDb8cQwqo1T0ZezgS9eEKGpbrceDm8PV4E",
            authDomain: "alkimista-os.firebaseapp.com",
            projectId: "alkimista-os",
            storageBucket: "alkimista-os.firebasestorage.app",
            messagingSenderId: "913918533081",
            appId: "1:913918533081:web:7bd424bbbff8c277e90dc8"
        };

        const firebaseApp = initializeApp(firebaseConfig);
        const auth = getAuth(firebaseApp);
        const db = getFirestore(firebaseApp);

        class AlkimistaApp {
            constructor() {
                this.user = null; this.total = 0; this.historico = []; this.produtos = [];
                this.fases = [{id: Date.now(), dose: '', freq: '', dias: '', tipo: 'caps'}];
                this.initAuth();
            }

            initAuth() {
                onAuthStateChanged(auth, async (u) => {
                    if (u) {
                        this.user = u;
                        document.getElementById('view-login').style.display = 'none';
                        await this.load();
                        this.setupListeners();
                        this.render();
                        this.renderFases();
                    } else {
                        document.getElementById('view-login').style.display = 'flex';
                    }
                });
                document.getElementById('btnLogin').onclick = () => {
                    const u = document.getElementById('loginUser').value;
                    const p = document.getElementById('loginPass').value;
                    signInWithEmailAndPassword(auth, u + "@alkimista.com", p);
                };
            }

            calc() {
                const input = document.getElementById('vOrig');
                const v = parseFloat(input.value.replace(',', '.')) || 0;
                this.tempV = v * 0.8;
                document.getElementById('bruto').innerText = this.fmt(v);
                document.getElementById('comDesconto').innerText = this.fmt(this.tempV);
                document.getElementById('btnSomar').disabled = v <= 0;
            }

            async somar() {
                if(!this.tempV) return;
                this.total += this.tempV;
                const input = document.getElementById('vOrig');
                this.historico.push({o: parseFloat(input.value.replace(',','.'))||0, f: this.tempV});
                input.value = ""; this.calc();
                this.render(); await this.save();
            }

            setupListeners() {
                const vOrig = document.getElementById('vOrig');
                vOrig.oninput = () => {
                    vOrig.value = vOrig.value.replace(/[^0-9,.]/g, '');
                    this.calc();
                };
                vOrig.onkeydown = (e) => e.key === 'Enter' && this.somar();
                document.getElementById('btnSomar').onclick = () => this.somar();
                document.getElementById('btnLimpar').onclick = () => { vOrig.value = ""; this.calc(); };
                document.getElementById('btnResetTotal').onclick = () => { this.total = 0; this.historico = []; this.render(); this.save(); };
                document.getElementById('pBusca').oninput = () => this.renderProds();
            }

            addFase() { this.fases.push({id: Date.now(), dose: '', freq: '', dias: '', tipo: 'caps'}); this.renderFases(); }
            updateFase(id, field, val) {
                const f = this.fases.find(x => x.id === id);
                if(f) f[field] = val;
                this.calcFases();
            }
            calcFases() {
                let c = 0, l = 0;
                this.fases.forEach(f => {
                    let sub = (parseFloat(f.dose)||0) * (parseFloat(f.freq)||0) * (parseFloat(f.dias)||0);
                    if(f.tipo === 'gotas') l += sub/20; else if(f.tipo === 'ml') l += sub; else c += sub;
                });
                document.getElementById('resGeral').innerText = `${Math.ceil(c)} Cáps + ${l.toFixed(2)} mL`;
            }
            renderFases() {
                document.getElementById('fasesContainer').innerHTML = this.fases.map(f => `
                    <div style="border:1px solid #ddd; padding:10px; border-radius:10px; margin-bottom:10px">
                        <input type="text" placeholder="Dose" value="${f.dose}" oninput="window.App.updateFase(${f.id},'dose',this.value)">
                        <input type="text" placeholder="x/dia" value="${f.freq}" oninput="window.App.updateFase(${f.id},'freq',this.value)">
                        <input type="text" placeholder="Dias" value="${f.dias}" oninput="window.App.updateFase(${f.id},'dias',this.value)">
                        <select onchange="window.App.updateFase(${f.id},'tipo',this.value)">
                            <option value="caps" ${f.tipo=='caps'?'selected':''}>Cáps</option>
                            <option value="gotas" ${f.tipo=='gotas'?'selected':''}>Gotas</option>
                            <option value="ml" ${f.tipo=='ml'?'selected':''}>mL</option>
                        </select>
                    </div>`).join('');
                this.calcFases();
            }

            async save() { if(this.user) await setDoc(doc(db, "usuarios", this.user.uid), {total:this.total, historico:this.historico}, {merge:true}); }
            async load() { const d = await getDoc(doc(db, "usuarios", this.user.uid)); if(d.exists()){ this.total=d.data().total||0; this.historico=d.data().historico||[]; } }
            fmt(v) { return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }
            switch(v) { document.querySelectorAll('.view, .nav-item').forEach(el => el.classList.remove('active')); document.getElementById('view-'+v).classList.add('active'); document.getElementById('nav-'+v).classList.add('active'); }
            render() {
                document.getElementById('totalVal').innerText = this.fmt(this.total);
                document.getElementById('histLista').innerHTML = this.historico.slice().reverse().map(h => `<div class="display-line"><span>De ${this.fmt(h.o)}</span><b>→ ${this.fmt(h.f)}</b></div>`).join('');
            }
            async logout() { await signOut(auth); location.reload(); }
        }
        window.App = new AlkimistaApp();
    </script>
</body>
</html>
