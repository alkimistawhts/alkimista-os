<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0047AB">
    <title>Alkimista Pro v4.0</title>
    
    <link rel="manifest" href='data:application/manifest+json,{"name":"Alkimista Pro","short_name":"Alkimista","start_url":".","display":"standalone","background_color":"#0047AB","theme_color":"#0047AB","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/190/190411.png","sizes":"512x512","type":"image/png"}]}'>

    <style>
        :root {
            --bg-body: #0047AB;
            --bg-container: #ffffff;
            --text-main: #1e293b;
            --text-sub: #475569;
            --input-bg: #f8fafc;
            --border: #e2e8f0;
            --tab-bg: #f1f5f9;
            --card-bg: #ffffff;
        }

        .dark-mode {
            --bg-body: #0f172a;
            --bg-container: #1e293b;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --input-bg: #0f172a;
            --border: #334155;
            --tab-bg: #0f172a;
            --card-bg: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; transition: background 0.3s, color 0.3s; }
        body { background-color: var(--bg-body); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        
        .container { 
            background: var(--bg-container); padding: 2rem; border-radius: 28px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.4); 
            max-width: 480px; width: 100%; position: relative;
        }

        /* HEADER & DARK MODE TOGGLE */
        .header-actions { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; }
        .icon-btn { background: var(--tab-bg); border: none; width: 40px; height: 40px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: var(--text-main); }

        .tabs { display: flex; gap: 10px; margin-bottom: 20px; background: var(--tab-bg); padding: 6px; border-radius: 18px; margin-top: 10px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 14px; cursor: pointer; font-weight: 700; color: var(--text-sub); background: transparent; }
        .tab-btn.active { background: var(--bg-container); color: #3b82f6; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h1 { color: var(--text-main); text-align: center; font-size: 1.5rem; margin-bottom: 1.2rem; font-weight: 800; }
        label { display: block; margin-bottom: 6px; font-weight: 700; color: var(--text-sub); font-size: 0.85rem; }
        input, textarea, select { width: 100%; padding: 14px; border: 2px solid var(--border); border-radius: 14px; font-size: 16px; outline: none; background: var(--input-bg); color: var(--text-main); margin-bottom: 15px; }

        /* CATEGORIAS E FILTROS */
        .filter-bar { display: flex; gap: 5px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 15px; }
        .filter-chip { padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; cursor: pointer; border: 1px solid var(--border); background: var(--tab-bg); color: var(--text-sub); white-space: nowrap; }
        .filter-chip.active { background: #0047AB; color: white; border-color: #0047AB; }

        /* CARDS */
        .resultados { background: var(--tab-bg); padding: 15px; border-radius: 20px; margin-bottom: 15px; }
        .total-box { background: linear-gradient(135deg, #0047AB, #1d4ed8); color: white; padding: 20px; border-radius: 22px; text-align: center; margin-bottom: 15px; }
        
        .nota-card { background: var(--card-bg); border: 1px solid var(--border); padding: 15px; border-radius: 18px; margin-bottom: 10px; position: relative; border-left-width: 6px; }
        .cat-geral { border-left-color: #3b82f6; }
        .cat-urgente { border-left-color: #ef4444; }
        .cat-cliente { border-left-color: #10b981; }
        .cat-estoque { border-left-color: #f59e0b; }

        .btn { width: 100%; padding: 16px; border: none; border-radius: 16px; font-weight: 700; cursor: pointer; font-size: 1rem; margin-bottom: 10px; }
        .btn-blue { background: #0047AB; color: white; }
        .btn-green { background: #10b981; color: white; }
        .btn-del { position: absolute; top: 10px; right: 10px; background: #fee2e2; color: #ef4444; border: none; width: 26px; height: 26px; border-radius: 8px; cursor: pointer; }

        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-150%); background: var(--bg-container); color: var(--text-main); padding: 15px 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 10000; transition: 0.5s ease; border-left: 6px solid #0047AB; width: 90%; max-width: 380px; }
        #toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div id="toast"><div id="toastMsg"></div></div>

<div class="container">
    <div class="header-actions">
        <button class="icon-btn" onclick="App.toggleDarkMode()" title="Alternar Tema">🌓</button>
    </div>

    <nav class="tabs">
        <button class="tab-btn active" onclick="App.switch('calc')" id="t-calc">Calculadora</button>
        <button class="tab-btn" onclick="App.switch('notes')" id="t-notes">Anotações</button>
    </nav>

    <div id="view-calc" class="tab-content active">
        <h1>Alkimista 20%</h1>
        <label>Valor Original</label>
        <input type="number" id="vOrig" placeholder="R$ 0,00" inputmode="decimal" oninput="App.calc()">
        
        <div class="resultados">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px; color:var(--text-sub); font-weight:600">
                <span>Base:</span> <span id="displayBase">R$ 0,00</span>
            </div>
            <div style="display:flex; justify-content:space-between; color:#10b981; font-weight:800; font-size:1.1rem">
                <span>Com Desconto:</span> <span id="displayFin">R$ 0,00</span>
            </div>
        </div>

        <div class="total-box">
            <div style="font-size: 0.75rem; font-weight: 700; opacity: 0.9; margin-bottom: 5px;">TOTAL ACUMULADO</div>
            <div style="font-size: 2.2rem; font-weight: 800;" id="totalVal">R$ 0,00</div>
        </div>
        
        <button class="btn btn-green" id="btnSomar" onclick="App.somar()" disabled>➕ Somar ao Total</button>
        <button class="btn btn-blue" onclick="App.limpar()" style="background:#64748b">Limpar</button>
    </div>

    <div id="view-notes" class="tab-content">
        <h1>Anotações</h1>
        
        <label>Categoria</label>
        <select id="nCat">
            <option value="geral">🔵 Geral</option>
            <option value="urgente">🔴 Urgente</option>
            <option value="cliente">🟢 Cliente</option>
            <option value="estoque">🟠 Estoque</option>
        </select>

        <textarea id="nTexto" rows="2" placeholder="O que deseja anotar?"></textarea>
        
        <div style="display: flex; gap: 10px;">
            <div style="flex:1"><label>Data</label><input type="date" id="nData"></div>
            <div style="flex:1"><label>Hora</label><input type="time" id="nHora"></div>
        </div>

        <button class="btn btn-blue" onclick="App.addNota()">✨ Salvar Nota</button>

        <div class="filter-bar" id="filtroBar">
            <div class="filter-chip active" onclick="App.filtrar('todas')">Todas</div>
            <div class="filter-chip" onclick="App.filtrar('urgente')">Urgentes</div>
            <div class="filter-chip" onclick="App.filtrar('cliente')">Clientes</div>
            <div class="filter-chip" onclick="App.filtrar('estoque')">Estoque</div>
        </div>

        <div id="notasLista"></div>
    </div>
</div>

<script>
class AlkimistaApp {
    constructor() {
        this.total = 0; this.notas = []; this.tmpF = 0; this.filtroAtivo = 'todas';
        this.isDark = false;
        this.init();
    }

    init() {
        this.load();
        this.render();
        if(this.isDark) document.body.classList.add('dark-mode');
        setInterval(() => this.monitor(), 15000);
    }

    toggleDarkMode() {
        this.isDark = !this.isDark;
        document.body.classList.toggle('dark-mode');
        this.save();
    }

    switch(t) {
        document.querySelectorAll('.tab-content, .tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(`view-${t}`).classList.add('active');
        document.getElementById(`t-${t}`).classList.add('active');
    }

    calc() {
        const v = parseFloat(document.getElementById('vOrig').value);
        if (isNaN(v) || v <= 0) { 
            document.getElementById('displayBase').textContent = 'R$ 0,00';
            document.getElementById('displayFin').textContent = 'R$ 0,00';
            document.getElementById('btnSomar').disabled = true;
            return; 
        }
        this.tmpF = v * 0.8;
        document.getElementById('displayBase').textContent = this.fmt(v);
        document.getElementById('displayFin').textContent = this.fmt(this.tmpF);
        document.getElementById('btnSomar').disabled = false;
    }

    somar() {
        this.total += this.tmpF;
        document.getElementById('vOrig').value = '';
        this.calc(); this.render(); this.save();
        this.notify("Valor somado!");
    }

    limpar() { document.getElementById('vOrig').value = ''; this.calc(); }

    addNota() {
        const t = document.getElementById('nTexto').value;
        const d = document.getElementById('nData').value;
        const h = document.getElementById('nHora').value;
        const c = document.getElementById('nCat').value;
        if (!t) return;
        this.notas.push({ id: Date.now(), texto: t, data: d, hora: h, cat: c, done: false });
        this.render(); this.save();
        document.getElementById('nTexto').value = '';
        this.notify("Nota salva!");
    }

    filtrar(cat) {
        this.filtroAtivo = cat;
        document.querySelectorAll('.filter-chip').forEach(el => {
            el.classList.toggle('active', el.textContent.toLowerCase().includes(cat) || (cat==='todas' && el.textContent==='Todas'));
        });
        this.render();
    }

    notify(msg) {
        const t = document.getElementById('toast');
        document.getElementById('toastMsg').textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 4000);
        if (Notification.permission === "granted" && msg.includes(":")) {
            new Notification("Alkimista", { body: msg, silent: true });
        }
    }

    monitor() {
        const agora = new Date();
        const d = agora.toISOString().split('T')[0];
        const h = agora.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit', hour12: false});
        this.notas.forEach(n => {
            if (n.data && n.hora && !n.done && n.data === d && n.hora === h) {
                this.notify("Lembrete: " + n.texto);
                n.done = true; this.save(); this.render();
            }
        });
    }

    fmt(v) { return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }

    render() {
        document.getElementById('totalVal').textContent = this.fmt(this.total);
        const lista = document.getElementById('notasLista');
        const notasFiltradas = this.filtroAtivo === 'todas' ? this.notas : this.notas.filter(n => n.cat === this.filtroAtivo);
        
        lista.innerHTML = notasFiltradas.slice().reverse().map(n => `
            <div class="nota-card cat-${n.cat} ${n.done ? 'done' : ''}">
                <button class="btn-del" onclick="App.delNota(${n.id})">✕</button>
                <div style="font-size:0.7rem; font-weight:800; color:var(--text-sub); margin-bottom:5px">
                    ${n.data ? '📅 ' + n.data.split('-').reverse().join('/') : ''} ${n.hora || ''} 
                    <span style="text-transform: uppercase; margin-left:10px">• ${n.cat}</span>
                </div>
                <div style="color:var(--text-main); font-weight:500">${n.texto}</div>
            </div>`).join('');
    }

    delNota(id) { this.notas = this.notas.filter(n => n.id !== id); this.render(); this.save(); }
    save() { localStorage.setItem('alk_v4', JSON.stringify({ t: this.total, n: this.notas, dark: this.isDark })); }
    load() {
        const s = localStorage.getItem('alk_v4');
        if (s) { const p = JSON.parse(s); this.total = p.t || 0; this.notas = p.n || []; this.isDark = p.dark || false; }
    }
}
const App = new AlkimistaApp();
</script>
</body>
</html>
