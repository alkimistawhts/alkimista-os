<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0047AB">
    <title>Alkimista OS v13.1 - Secure Edition</title>
    
    <style>
        :root {
            --bg-body: #f1f5f9; --bg-sidebar: #0047AB; --bg-card: #ffffff;
            --text-main: #1e293b; --text-sub: #64748b; --accent: #3b82f6; --border: #e2e8f0;
            --sidebar-w: 70px; --danger: #ef4444; --success: #10b981;
        }

        .dark-mode {
            --bg-body: #0f172a; --bg-sidebar: #1e293b; --bg-card: #1e293b;
            --text-main: #f8fafc; --text-sub: #94a3b8; --accent: #38bdf8; --border: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; transition: 0.2s ease; }
        body { background-color: var(--bg-body); min-height: 100vh; display: flex; color: var(--text-main); overflow-x: hidden; }

        /* OVERLAYS */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 3000; }
        .overlay.active { display: flex; }
        .modal-container { background: var(--bg-card); width: 95%; max-width: 400px; padding: 30px; border-radius: 28px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2); }

        #view-login { z-index: 9999; background: var(--bg-body); display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; }

        /* SIDEBAR */
        .sidebar { width: var(--sidebar-w); background: var(--bg-sidebar); height: 100vh; display: flex; flex-direction: column; padding: 20px 10px; position: fixed; left: 0; top: 0; z-index: 2000; overflow: hidden; white-space: nowrap; }
        .sidebar:hover { width: 220px; box-shadow: 10px 0 30px rgba(0,0,0,0.2); }
        .nav-item { width: 100%; height: 50px; border-radius: 12px; margin-bottom: 15px; display: flex; align-items: center; padding: 0 13px; cursor: pointer; color: white; opacity: 0.6; }
        .nav-item i { font-size: 1.4rem; min-width: 30px; display: flex; justify-content: center; font-style: normal; }
        .nav-item span { margin-left: 15px; font-weight: 600; opacity: 0; }
        .sidebar:hover .nav-item span { opacity: 1; }
        .nav-item.active { opacity: 1; background: rgba(255,255,255,0.15); }

        /* CONTENT */
        .main { flex: 1; margin-left: var(--sidebar-w); padding: 20px; display: flex; justify-content: center; }
        .app-container { max-width: 600px; width: 100%; }
        .view { display: none; animation: fadeIn 0.3s; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--bg-card); padding: 20px; border-radius: 24px; border: 1px solid var(--border); margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h1 { font-size: 1.5rem; margin-bottom: 20px; text-align: center; font-weight: 800; }
        h2 { font-size: 0.8rem; text-transform: uppercase; color: var(--accent); margin-bottom: 15px; font-weight: 900; }
        label { font-size: 0.7rem; font-weight: 800; opacity: 0.6; margin-bottom: 4px; display: block; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 12px; font-size: 15px; outline: none; background: var(--bg-body); color: var(--text-main); margin-bottom: 10px; }

        .display-box { background: var(--bg-body); padding: 15px; border-radius: 18px; margin-bottom: 15px; }
        .total-banner { background: linear-gradient(135deg, #0047AB, #002B6A); color: white; padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 15px; }
        .total-banner b { font-size: 2.2rem; font-weight: 800; }

        .prod-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 18px; margin-bottom: 15px; }
        .nota-card { background: var(--bg-card); padding: 15px; border-radius: 16px; margin-bottom: 10px; border: 1px solid var(--border); border-left: 6px solid #0047AB; }

        button { width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; color: white; margin-bottom: 8px; }
        .btn-green { background: #10b981; }
        .btn-blue { background: #0047AB; }
        .btn-red { background: var(--danger); }
        .btn-gray { background: #64748b; }
        .btn-outline { background: transparent; border: 2px dashed var(--accent); color: var(--accent); }
        
        .theme-fab { position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; background: var(--bg-sidebar); color: white; border: none; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; cursor: pointer; z-index: 1000; }
        #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 10px 20px; border-radius: 50px; font-size: 0.8rem; z-index: 5000; display: none; }

        @media (max-width: 600px) {
            .sidebar { width: 100%; height: 65px; bottom: 0; top: auto; flex-direction: row; justify-content: space-around; padding: 0; border-radius: 20px 20px 0 0; }
            .nav-item span { display: none; }
            .main { margin-left: 0; margin-bottom: 80px; padding: 15px; }
        }
    </style>
</head>
<body>

    <div id="view-login" class="overlay active">
        <div class="modal-container">
            <h1 style="color:var(--bg-sidebar)">Alkimista OS</h1>
            <p style="text-align:center; opacity:0.6; margin-bottom:20px">v13.1 Secure Edition</p>
            <label>Usuário</label>
            <input type="text" id="loginUser" placeholder="Seu usuário">
            <label>Senha</label>
            <input type="password" id="loginPass" placeholder="Sua senha">
            <button class="btn-blue" id="btnLogin">Entrar</button>
            <p id="loginError" style="color:var(--danger); font-size:0.8rem; margin-top:10px; display:none; text-align:center;"></p>
        </div>
    </div>

    <div id="editOverlay" class="overlay">
        <div class="modal-container">
            <h2>📝 Editar Produto</h2>
            <input type="hidden" id="editId">
            <input type="text" id="editNome" placeholder="Nome">
            <input type="text" id="editAtivos" placeholder="Ativos">
            <input type="text" id="editServe" placeholder="Indicação">
            <textarea id="editPoso" rows="4" placeholder="Posologia"></textarea>
            <div style="display: flex; gap: 10px;">
                <button class="btn-gray" onclick="window.App.closeEdit()">Voltar</button>
                <button class="btn-blue" onclick="window.App.saveEdit()">Atualizar</button>
            </div>
        </div>
    </div>

    <div id="confirmOverlay" class="overlay">
        <div class="modal-container" style="text-align: center;">
            <div style="font-size: 3rem;">⚠️</div>
            <h2>Confirmação</h2>
            <p style="margin-bottom: 25px; opacity: 0.7;">Deseja prosseguir com esta ação?</p>
            <div style="display: flex; gap: 10px;">
                <button class="btn-gray" onclick="window.App.closeConfirm()">Cancelar</button>
                <button class="btn-red" id="confirmActionBtn">Confirmar</button>
            </div>
        </div>
    </div>

    <div id="toast">Copiado!</div>
    <button class="theme-fab" onclick="window.App.toggleDark()">🌓</button>

    <aside class="sidebar">
        <div class="nav-item active" onclick="window.App.switch('calc')" id="nav-calc"><i>🧮</i><span>Calculadora</span></div>
        <div class="nav-item" onclick="window.App.switch('prod')" id="nav-prod"><i>🧪</i><span>Produtos</span></div>
        <div class="nav-item" onclick="window.App.switch('notes')" id="nav-notes"><i>📝</i><span>Anotações</span></div>
        <div class="nav-item" onclick="window.App.logout()" style="margin-top:auto; opacity:0.4"><i>🚪</i><span>Sair</span></div>
    </aside>

    <main class="main">
        <div class="app-container">
            
            <div id="view-calc" class="view active">
                <h1>Calculadora 20%</h1>
                <div class="card">
                    <label>Valor Original</label>
                    <input type="number" id="vOrig" placeholder="0,00" step="0.01">
                    <div class="display-box">
                        <div style="display:flex; justify-content:space-between"><span>Bruto:</span> <span id="bruto">R$ 0,00</span></div>
                        <div style="display:flex; justify-content:space-between"><b>Com Desconto:</b> <b id="comDesconto" style="color:#10b981">R$ 0,00</b></div>
                    </div>
                    <div class="total-banner">
                        <small>TOTAL ACUMULADO</small><br>
                        <b id="totalVal">R$ 0,00</b>
                    </div>
                    <button class="btn-green" id="btnSomar">➕ Somar (Enter)</button>
                    <div style="display: flex; gap: 10px;">
                        <button id="btnLimpar" class="btn-gray" style="flex:1">Limpar</button>
                        <button id="btnResetTotal" class="btn-red" style="flex:1">Zerar</button>
                    </div>
                </div>
                <div id="histLista"></div>
            </div>

            <div id="view-prod" class="view">
                <h1>Catálogo Alkimista</h1>
                <div class="card" id="adminAddCard" style="display:none">
                    <h2>Novidade no Catálogo</h2>
                    <input type="text" id="pNome" placeholder="Nome">
                    <input type="text" id="pAtivos" placeholder="Ativos">
                    <input type="text" id="pServe" placeholder="Indicação">
                    <textarea id="pPoso" rows="2" placeholder="Posologia"></textarea>
                    <button class="btn-green" id="btnAddProd">Salvar no Catálogo Global</button>
                </div>
                <input type="text" id="pBusca" placeholder="🔍 Buscar no catálogo..." style="margin-bottom:15px">
                <div id="prodLista"></div>
            </div>

            <div id="view-notes" class="view">
                <h1>Anotações Pessoais</h1>
                <div class="card">
                    <select id="nCat">
                        <option value="aviso">🔵 Aviso</option>
                        <option value="urgente">🔴 Urgente</option>
                        <option value="verificação">🟢 Verificação</option>
                    </select>
                    <textarea id="nTexto" rows="3" placeholder="Escreva seu lembrete..."></textarea>
                    <button class="btn-blue" id="btnAddNota">Salvar Nota</button>
                </div>
                <div id="notasLista"></div>
            </div>

        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDb8cQwqo1T0ZezgS9eEKGpbrceDm8PV4E",
            authDomain: "alkimista-os.firebaseapp.com",
            projectId: "alkimista-os",
            storageBucket: "alkimista-os.firebasestorage.app",
            messagingSenderId: "913918533081",
            appId: "1:913918533081:web:7bd424bbbff8c277e90dc8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const DOMAIN = "@alkimista.com";

        class AlkimistaApp {
            constructor() {
                this.user = null; this.isAdmin = false;
                this.total = 0; this.historico = []; this.notas = []; this.produtos = [];
                this.isDark = false;
                this.initAuth();
            }

            initAuth() {
                onAuthStateChanged(auth, async (u) => {
                    if (u) {
                        this.user = u;
                        const uDoc = await getDoc(doc(db, "usuarios", u.uid));
                        if(uDoc.exists()) {
                            this.isAdmin = uDoc.data().isAdmin || false;
                        }
                        document.getElementById('view-login').style.display = 'none';
                        document.getElementById('adminAddCard').style.display = this.isAdmin ? 'block' : 'none';
                        await this.load();
                        this.setupListeners();
                        this.initUI();
                    } else {
                        document.getElementById('view-login').style.display = 'flex';
                        document.getElementById('btnLogin').onclick = () => this.handleLogin();
                    }
                });
            }

            async handleLogin() {
                const u = document.getElementById('loginUser').value.trim();
                const p = document.getElementById('loginPass').value;
                if(!u || !p) return;
                try {
                    await signInWithEmailAndPassword(auth, u + DOMAIN, p);
                } catch (e) {
                    const err = document.getElementById('loginError');
                    err.innerText = "Falha no acesso."; err.style.display = 'block';
                }
            }

            // FUNÇÃO SECRETA PARA CRIAR OS 6 ADMINS (Console F12)
            async adminCreate() {
                const k = prompt("Chave Mestre:");
                if(k !== "@Alk1mista_@2026@") return alert("Acesso Negado");
                const user = prompt("Novo User:");
                const pass = prompt("Senha:");
                try {
                    const res = await createUserWithEmailAndPassword(auth, user + DOMAIN, pass);
                    await setDoc(doc(db, "usuarios", res.user.uid), { isAdmin: true, nome: user });
                    alert("Admin Criado com Sucesso!");
                } catch(e) { alert(e.message); }
            }

            async save() {
                if(!this.user) return;
                // Salva dados do usuário
                await setDoc(doc(db, "usuarios", this.user.uid), {
                    total: this.total, historico: this.historico, notas: this.notas, isDark: this.isDark
                }, { merge: true });
                
                // Só salva o catálogo se for ADMIN
                if(this.isAdmin) {
                    await setDoc(doc(db, "configuracoes", "catalogo"), { produtos: this.produtos });
                }
            }

            async load() {
                const uDoc = await getDoc(doc(db, "usuarios", this.user.uid));
                if(uDoc.exists()){
                    const d = uDoc.data();
                    this.total = d.total || 0; this.historico = d.historico || [];
                    this.notas = d.notas || []; this.isDark = d.isDark || false;
                }
                const cDoc = await getDoc(doc(db, "configuracoes", "catalogo"));
                if(cDoc.exists()) this.produtos = cDoc.data().produtos || [];
            }

            // --- CALCULADORA ---
            calc() {
                const v = parseFloat(document.getElementById('vOrig').value) || 0;
                document.getElementById('bruto').innerText = this.fmt(v);
                document.getElementById('comDesconto').innerText = this.fmt(v * 0.8);
            }

            async somar() {
                const v = parseFloat(document.getElementById('vOrig').value) || 0;
                if(v <= 0) return;
                this.total += (v * 0.8);
                this.historico.push({o: v, f: v * 0.8});
                document.getElementById('vOrig').value = "";
                this.render(); await this.save();
            }

            // --- PRODUTOS (COM TRAVA ADMIN) ---
            renderProds() {
                const b = document.getElementById('pBusca').value.toLowerCase();
                const filtered = this.produtos.filter(p => p.nome.toLowerCase().includes(b) || p.ativos.toLowerCase().includes(b));
                document.getElementById('prodLista').innerHTML = filtered.slice().reverse().map(p => `
                    <div class="prod-card">
                        <b style="color:var(--accent)">${p.nome}</b>
                        <p style="font-size:0.8rem; margin:5px 0">${p.ativos}</p>
                        <div style="display:flex; gap:5px">
                            <button class="btn-blue" style="flex:2" onclick="window.App.copyProd(${p.id})">📋 COPIAR</button>
                            ${this.isAdmin ? `
                                <button class="btn-gray" style="flex:1" onclick="window.App.editProd(${p.id})">EDITAR</button>
                                <button class="btn-red" style="width:45px" onclick="window.App.delProd(${p.id})">X</button>
                            ` : ''}
                        </div>
                    </div>`).join('');
            }

            async addFullProd() {
                if(!this.isAdmin) return alert("Apenas administradores podem alterar o catálogo.");
                const p = { id: Date.now(), nome: document.getElementById('pNome').value, ativos: document.getElementById('pAtivos').value, serve: document.getElementById('pServe').value, poso: document.getElementById('pPoso').value };
                if(!p.nome) return;
                this.produtos.push(p);
                this.renderProds(); await this.save();
                ['pNome','pAtivos','pServe','pPoso'].forEach(i => document.getElementById(i).value="");
            }

            async delProd(id) {
                if(!this.isAdmin) return;
                this.openConfirm(async () => {
                    this.produtos = this.produtos.filter(p => p.id !== id);
                    this.renderProds(); await this.save();
                });
            }

            editProd(id) {
                const p = this.produtos.find(x => x.id === id);
                ['Id','Nome','Ativos','Serve','Poso'].forEach(f => document.getElementById('edit'+f).value = p[f.toLowerCase()]);
                document.getElementById('editOverlay').classList.add('active');
            }

            async saveEdit() {
                const id = parseInt(document.getElementById('editId').value);
                this.produtos = this.produtos.map(p => p.id === id ? {id, nome: document.getElementById('editNome').value, ativos: document.getElementById('editAtivos').value, serve: document.getElementById('editServe').value, poso: document.getElementById('editPoso').value} : p);
                this.closeEdit(); this.renderProds(); await this.save();
            }

            // --- AUXILIARES ---
            fmt(v) { return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }
            
            render() {
                document.getElementById('totalVal').innerText = this.fmt(this.total);
                document.getElementById('histLista').innerHTML = this.historico.slice(-5).reverse().map(h => `
                    <div style="display:flex;justify-content:space-between;font-size:0.8rem;border-bottom:1px solid var(--border);padding:4px 0">
                        <span>De ${this.fmt(h.o)}</span><b>→ ${this.fmt(h.f)}</b>
                    </div>`).join('');
                document.getElementById('notasLista').innerHTML = this.notas.slice().reverse().map(n => `
                    <div class="nota-card" style="border-left-color:${n.cat=='urgente'?'red':'#0047AB'}">
                        <span style="color:red; float:right; font-size:0.7rem; cursor:pointer" onclick="window.App.delNota(${n.id})">Excluir</span>
                        <b>${n.txt}</b>
                    </div>`).join('');
                this.renderProds();
            }

            async addNota() {
                const txt = document.getElementById('nTexto').value;
                if(!txt) return;
                this.notas.push({id: Date.now(), txt, cat: document.getElementById('nCat').value});
                document.getElementById('nTexto').value = "";
                this.render(); await this.save();
            }

            async delNota(id) { this.notas = this.notas.filter(n => n.id !== id); this.render(); await this.save(); }

            copyProd(id) {
                const p = this.produtos.find(x => x.id === id);
                const txt = `*PRODUTO:* ${p.nome}\n*INDICAÇÃO:* ${p.serve}\n*COMPOSIÇÃO:* ${p.ativos}`;
                navigator.clipboard.writeText(txt).then(() => {
                    const t = document.getElementById('toast'); t.style.display = 'block';
                    setTimeout(() => t.style.display = 'none', 2000);
                });
            }

            switch(v) {
                document.querySelectorAll('.view, .nav-item').forEach(el => el.classList.remove('active'));
                document.getElementById('view-'+v).classList.add('active');
                document.getElementById('nav-'+v).classList.add('active');
            }

            setupListeners() {
                document.getElementById('vOrig').oninput = () => this.calc();
                document.getElementById('vOrig').onkeydown = (e) => e.key === 'Enter' && this.somar();
                document.getElementById('btnSomar').onclick = () => this.somar();
                document.getElementById('btnAddProd').onclick = () => this.addFullProd();
                document.getElementById('pBusca').oninput = () => this.renderProds();
                document.getElementById('btnAddNota').onclick = () => this.addNota();
                document.getElementById('btnResetTotal').onclick = () => this.openConfirm(() => { this.total = 0; this.historico = []; this.render(); this.save(); });
            }

            initUI() { if(this.isDark) document.body.classList.add('dark-mode'); this.render(); }
            toggleDark() { this.isDark = !this.isDark; document.body.classList.toggle('dark-mode', this.isDark); this.save(); }
            logout() { signOut(auth).then(() => location.reload()); }
            openConfirm(cb) { document.getElementById('confirmOverlay').classList.add('active'); document.getElementById('confirmActionBtn').onclick = () => { cb(); this.closeConfirm(); }; }
            closeConfirm() { document.getElementById('confirmOverlay').classList.remove('active'); }
            closeEdit() { document.getElementById('editOverlay').classList.remove('active'); }
        }

        window.App = new AlkimistaApp();
    </script>
</body>
</html>
