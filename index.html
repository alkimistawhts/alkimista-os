<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0047AB">
    <title>Alkimista OS v13.2 - Corrigido</title>
    
    <style>
        :root {
            --bg-body: #f1f5f9; --bg-sidebar: #0047AB; --bg-card: #ffffff;
            --text-main: #1e293b; --text-sub: #64748b; --accent: #3b82f6; --border: #e2e8f0;
            --sidebar-w: 70px; --danger: #ef4444; --success: #10b981;
        }

        .dark-mode {
            --bg-body: #0f172a; --bg-sidebar: #1e293b; --bg-card: #1e293b;
            --text-main: #f8fafc; --text-sub: #94a3b8; --accent: #38bdf8; --border: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; transition: 0.2s ease; }
        body { background-color: var(--bg-body); min-height: 100vh; display: flex; color: var(--text-main); overflow-x: hidden; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 3000; }
        .overlay.active { display: flex; }
        .modal-container { background: var(--bg-card); width: 95%; max-width: 400px; padding: 30px; border-radius: 28px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2); }

        .sidebar { width: var(--sidebar-w); background: var(--bg-sidebar); height: 100vh; display: flex; flex-direction: column; padding: 20px 10px; position: fixed; left: 0; top: 0; z-index: 2000; overflow: hidden; white-space: nowrap; }
        .sidebar:hover { width: 220px; box-shadow: 10px 0 30px rgba(0,0,0,0.2); }
        .nav-item { width: 100%; height: 50px; border-radius: 12px; margin-bottom: 15px; display: flex; align-items: center; padding: 0 13px; cursor: pointer; color: white; opacity: 0.6; }
        .nav-item i { font-size: 1.4rem; min-width: 30px; display: flex; justify-content: center; font-style: normal; }
        .nav-item span { margin-left: 15px; font-weight: 600; opacity: 0; }
        .sidebar:hover .nav-item span { opacity: 1; }
        .nav-item.active { opacity: 1; background: rgba(255,255,255,0.15); }

        .main { flex: 1; margin-left: var(--sidebar-w); padding: 20px; display: flex; justify-content: center; }
        .app-container { max-width: 600px; width: 100%; }
        .view { display: none; animation: fadeIn 0.3s; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--bg-card); padding: 20px; border-radius: 24px; border: 1px solid var(--border); margin-bottom: 20px; }
        h1 { font-size: 1.5rem; margin-bottom: 20px; text-align: center; font-weight: 800; }
        label { font-size: 0.7rem; font-weight: 800; opacity: 0.6; margin-bottom: 4px; display: block; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 12px; background: var(--bg-body); color: var(--text-main); margin-bottom: 10px; }

        .total-banner { background: linear-gradient(135deg, #0047AB, #002B6A); color: white; padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 15px; }
        .total-banner b { font-size: 2.2rem; font-weight: 800; }

        button { width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; color: white; margin-bottom: 8px; }
        .btn-green { background: #10b981; }
        .btn-blue { background: #0047AB; }
        .btn-red { background: var(--danger); }
        .btn-gray { background: #64748b; }
        
        #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 10px 20px; border-radius: 50px; display: none; z-index: 5000; }

        @media (max-width: 600px) {
            .sidebar { width: 100%; height: 65px; bottom: 0; top: auto; flex-direction: row; justify-content: space-around; padding: 0; border-radius: 20px 20px 0 0; }
            .nav-item span { display: none; }
            .main { margin-left: 0; margin-bottom: 80px; }
        }
    </style>
</head>
<body>

    <div id="toast">Copiado!</div>

    <aside class="sidebar">
        <div class="nav-item active" onclick="window.App.switch('calc')" id="nav-calc"><i>🧮</i><span>Calculadora</span></div>
        <div class="nav-item" onclick="window.App.switch('prod')" id="nav-prod"><i>🧪</i><span>Produtos</span></div>
        <div class="nav-item" onclick="window.App.switch('notes')" id="nav-notes"><i>📝</i><span>Anotações</span></div>
        <div class="nav-item" onclick="window.App.switch('serv')" id="nav-serv"><i>📏</i><span>Serviços</span></div>
    </aside>

    <main class="main">
        <div class="app-container">
            
            <div id="view-calc" class="view active">
                <h1>Calculadora 20%</h1>
                <div class="card">
                    <label>Valor Original</label>
                    <input type="number" id="vOrig" placeholder="0,00" step="0.01">
                    <div style="background: var(--bg-body); padding: 15px; border-radius: 15px; margin-bottom: 15px;">
                        <div style="display:flex; justify-content: space-between"><span>Bruto:</span> <span id="bruto">R$ 0,00</span></div>
                        <div style="display:flex; justify-content: space-between"><b>Com Desconto:</b> <b id="comDesconto" style="color:#10b981">R$ 0,00</b></div>
                    </div>
                    <div class="total-banner">
                        <small>TOTAL ACUMULADO</small><br>
                        <b id="totalVal">R$ 0,00</b>
                    </div>
                    <button class="btn-green" id="btnSomar">➕ Somar Valor</button>
                    <button id="btnResetTotal" class="btn-red">Zerar Histórico</button>
                </div>
                <div id="histLista"></div>
            </div>

            <div id="view-prod" class="view">
                <h1>Catálogo Alkimista</h1>
                <div class="card">
                    <input type="hidden" id="pId">
                    <input type="text" id="pNome" placeholder="Nome do Produto">
                    <input type="text" id="pAtivos" placeholder="Ativos">
                    <input type="text" id="pServe" placeholder="Indicação">
                    <textarea id="pPoso" rows="2" placeholder="Posologia"></textarea>
                    <button class="btn-green" id="btnAddProd">Salvar Produto</button>
                </div>
                <input type="text" id="pBusca" placeholder="🔍 Buscar no catálogo..." style="margin-bottom:15px">
                <div id="prodLista"></div>
            </div>

            <div id="view-notes" class="view">
                <h1>Anotações Agendadas</h1>
                <div class="card">
                    <div style="display: flex; gap: 10px;">
                        <input type="date" id="nData">
                        <input type="time" id="nHora">
                    </div>
                    <textarea id="nTexto" rows="3" placeholder="O que deseja lembrar?"></textarea>
                    <button class="btn-blue" id="btnAddNota">Agendar Lembrete</button>
                </div>
                <div id="notasLista"></div>
            </div>

            <div id="view-serv" class="view">
                <h1>Serviços Clínicos</h1>
                <div class="card">
                    <h2>Cálculo de Cápsulas/mL</h2>
                    <div id="fasesContainer"></div>
                    <button class="btn-blue" onclick="window.App.addFase()">+ Adicionar Fase</button>
                    <div class="total-banner" style="margin-top:15px;">
                        <b id="resGeral">0 uni</b>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script type="module">
        // Firebase e Lógica
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDb8cQwqo1T0ZezgS9eEKGpbrceDm8PV4E",
            projectId: "alkimista-os",
            // ... (restante do seu config)
        };

        const fApp = initializeApp(firebaseConfig);
        const db = getFirestore(fApp);

        class AlkimistaApp {
            constructor() {
                this.total = 0;
                this.historico = [];
                this.produtos = [];
                this.notas = [];
                this.fases = [{id: 1, dose: '', freq: '', dias: '', tipo: 'caps'}];
                this.init();
            }

            async init() {
                await this.load();
                this.setupEvents();
                this.render();
                this.checkNotifications();
                setInterval(() => this.checkNotifications(), 10000); // Checa a cada 10s
                
                // Pedir permissão de notificação logo ao abrir
                if ("Notification" in window) Notification.requestPermission();
            }

            setupEvents() {
                // Eventos Calculadora
                const vOrig = document.getElementById('vOrig');
                vOrig.addEventListener('input', () => {
                    const val = parseFloat(vOrig.value) || 0;
                    document.getElementById('bruto').innerText = this.fmt(val);
                    document.getElementById('comDesconto').innerText = this.fmt(val * 0.8);
                });
                
                document.getElementById('btnSomar').onclick = () => this.somar();
                document.getElementById('btnResetTotal').onclick = () => { if(confirm("Zerar?")) { this.total = 0; this.historico = []; this.render(); this.save(); } };
                
                // Eventos Produtos
                document.getElementById('btnAddProd').onclick = () => this.saveProd();
                document.getElementById('pBusca').oninput = () => this.renderProds();

                // Eventos Notas
                document.getElementById('btnAddNota').onclick = () => this.saveNota();
            }

            // --- CALCULADORA ---
            somar() {
                const val = parseFloat(document.getElementById('vOrig').value) || 0;
                if(val <= 0) return;
                const desc = val * 0.8;
                this.total += desc;
                this.historico.push({bruto: val, liquido: desc});
                document.getElementById('vOrig').value = "";
                this.render();
                this.save();
            }

            // --- PRODUTOS (COM EDITAR) ---
            saveProd() {
                const id = document.getElementById('pId').value;
                const novo = {
                    id: id ? parseInt(id) : Date.now(),
                    nome: document.getElementById('pNome').value,
                    ativos: document.getElementById('pAtivos').value,
                    serve: document.getElementById('pServe').value,
                    poso: document.getElementById('pPoso').value
                };

                if(id) {
                    const idx = this.produtos.findIndex(p => p.id == id);
                    this.produtos[idx] = novo;
                } else {
                    this.produtos.push(novo);
                }

                ['pId', 'pNome', 'pAtivos', 'pServe', 'pPoso'].forEach(i => document.getElementById(i).value = "");
                this.renderProds();
                this.save();
            }

            editProd(id) {
                const p = this.produtos.find(x => x.id == id);
                document.getElementById('pId').value = p.id;
                document.getElementById('pNome').value = p.nome;
                document.getElementById('pAtivos').value = p.ativos;
                document.getElementById('pServe').value = p.serve;
                document.getElementById('pPoso').value = p.poso;
                this.switch('prod');
                window.scrollTo(0,0);
            }

            // --- NOTIFICAÇÕES ---
            saveNota() {
                const n = {
                    id: Date.now(),
                    data: document.getElementById('nData').value,
                    hora: document.getElementById('nHora').value,
                    txt: document.getElementById('nTexto').value,
                    done: false
                };
                if(!n.txt || !n.hora) return;
                this.notas.push(n);
                this.renderNotas();
                this.save();
                document.getElementById('nTexto').value = "";
            }

            checkNotifications() {
                const agora = new Date();
                const d = agora.toISOString().split('T')[0];
                const h = agora.toTimeString().slice(0,5);

                this.notas.forEach(n => {
                    if(n.data === d && n.hora === h && !n.done) {
                        n.done = true;
                        if (Notification.permission === "granted") {
                            new Notification("Lembrete Alkimista", { body: n.txt, icon: 'https://cdn-icons-png.flaticon.com/512/190/190411.png' });
                        } else {
                            alert("ALERTA: " + n.txt);
                        }
                        this.save();
                        this.renderNotas();
                    }
                });
            }

            // --- AUXILIARES ---
            fmt(v) { return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }
            
            switch(v) {
                document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
                document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                document.getElementById('view-'+v).classList.add('active');
                document.getElementById('nav-'+v).classList.add('active');
            }

            async save() {
                // Simulação de salvamento (se tiver UID do usuário, use doc(db, "usuarios", uid))
                localStorage.setItem('alk_data', JSON.stringify({t: this.total, h: this.historico, p: this.produtos, n: this.notas}));
            }

            async load() {
                const local = JSON.parse(localStorage.getItem('alk_data'));
                if(local) {
                    this.total = local.t || 0;
                    this.historico = local.h || [];
                    this.produtos = local.p || [];
                    this.notas = local.n || [];
                }
            }

            render() {
                document.getElementById('totalVal').innerText = this.fmt(this.total);
                document.getElementById('histLista').innerHTML = this.historico.slice().reverse().map(i => `
                    <div style="display:flex;justify-content:space-between;padding:5px;border-bottom:1px solid #ddd;font-size:0.8rem">
                        <span>Bruto: ${this.fmt(i.bruto)}</span>
                        <b>→ ${this.fmt(i.liquido)}</b>
                    </div>`).join('');
                this.renderProds();
                this.renderNotas();
            }

            renderProds() {
                const b = document.getElementById('pBusca').value.toLowerCase();
                const list = this.produtos.filter(p => p.nome.toLowerCase().includes(b));
                document.getElementById('prodLista').innerHTML = list.map(p => `
                    <div class="card" style="padding:15px; margin-bottom:10px">
                        <b>${p.nome}</b><br><small>${p.ativos}</small>
                        <div style="display:flex;gap:5px;margin-top:10px">
                            <button class="btn-blue" style="padding:5px" onclick="window.App.editProd(${p.id})">Editar</button>
                            <button class="btn-red" style="padding:5px" onclick="window.App.delProd(${p.id})">X</button>
                        </div>
                    </div>`).join('');
            }

            renderNotas() {
                document.getElementById('notasLista').innerHTML = this.notas.slice().reverse().map(n => `
                    <div class="card" style="border-left:5px solid ${n.done ? 'gray' : '#0047AB'}">
                        <small>${n.data} às ${n.hora}</small><br>
                        <b>${n.txt}</b>
                        ${n.done ? '<br><small style="color:green">✓ Notificado</small>' : ''}
                    </div>`).join('');
            }
            
            delProd(id) { if(confirm("Excluir?")) { this.produtos = this.produtos.filter(p => p.id != id); this.renderProds(); this.save(); } }
        }

        window.App = new AlkimistaApp();
    </script>
</body>
</html>
